<!-- ===================================================== -->
<!-- SCREENSHOTS SECTION -->
<!-- ===================================================== -->

<section id="screenshots">

    <!-- Section Heading -->
    <h2 class="reveal">
        Screenshots
    </h2>

    <!-- Screenshot Grid -->
    <div class="screenshot-grid">

        <!-- Screenshot 1 -->
        <div class="screenshot-card reveal">

            <img
                src="assets/screenshots/ss1.webp"
                alt="Screenshot 1"
                class="gallery-image"
                data-index="0">

        </div>

        <!-- Screenshot 2 -->
        <div class="screenshot-card reveal">

            <img
                src="assets/screenshots/ss2.webp"
                alt="Screenshot 2"
                class="gallery-image"
                data-index="1">

        </div>

        <!-- Screenshot 3 -->
        <div class="screenshot-card reveal">

            <img
                src="assets/screenshots/ss3.webp"
                alt="Screenshot 3"
                class="gallery-image"
                data-index="2">

        </div>

    </div>

</section>


<!-- ===================================================== -->
<!-- LIGHTBOX -->
<!-- ===================================================== -->

<div id="galleryLightbox" class="gallery-lightbox">

    <!-- Dark Background -->
    <div class="gallery-overlay"></div>

    <!-- Main Viewer -->
    <div class="gallery-container">

        <!-- Close Button -->
        <button
            class="gallery-close"
            id="galleryClose"
            aria-label="Close Gallery">

            ✕

        </button>

        <!-- Previous Button -->
        <button
            class="gallery-prev"
            id="galleryPrev"
            aria-label="Previous Screenshot">

            ❮

        </button>

        <!-- Image Stage -->
        <div class="gallery-stage">

            <!-- Active Image -->
            <img
                id="galleryViewer"
                src=""
                alt="Screenshot Preview">

        </div>

        <!-- Next Button -->
        <button
            class="gallery-next"
            id="galleryNext"
            aria-label="Next Screenshot">

            ❯

        </button>

        <!-- Bottom Controls -->
        <div class="gallery-bottom">

            <!-- Image Counter -->
            <div
                class="gallery-counter"
                id="galleryCounter">

                1 / 3

            </div>

            <!-- Zoom Indicator -->
            <div
                class="gallery-zoom"
                id="galleryZoom">

                100%

            </div>

        </div>

    </div>

</div>
